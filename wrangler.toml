name = "astralstash-api"
main = "workers/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "astralstash"
database_id = "7b55e245-78f2-44b2-9ba5-8da519f9740a"

[vars]
# Non-sensitive variables only
ENVIRONMENT = "production"
ALLOW_SIGNUPS = "true"


# IMPORTANT: Set JWT_SECRET using Cloudflare dashboard or wrangler CLI:
# Generate a secure key:
# node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

# wrangler secret put JWT_SECRET

# Note: JWT_SECRET is also used for encrypting AI API keys in the database
